<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith — Counsellor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;font-family:'Inter',sans-serif;background:#0B1F4A;color:#fff}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,31,74,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07)}
.logo{display:flex;align-items:center;gap:8px}
.logo-mark{width:32px;height:32px;background:#1A56DB;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.logo-name{font-size:14px;font-weight:600;color:#fff}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-email{font-size:12px;color:rgba(255,255,255,0.35)}
.nav-signout{padding:7px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif}
.nav-signout:active{background:rgba(255,255,255,0.1)}
.page{padding:80px 24px 60px;max-width:800px;margin:0 auto}
.page-header{margin-bottom:24px}
.page-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.page-sub{font-size:13px;color:rgba(255,255,255,0.4)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:8px 16px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:20px;color:rgba(255,255,255,0.5);font-size:12.5px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:.2s}
.filter-btn:active{transform:scale(0.97)}
.filter-btn.active{background:rgba(26,86,219,0.2);border-color:#1A56DB;color:#fff}
.loading{text-align:center;padding:60px 0;color:rgba(255,255,255,0.3);font-size:14px}
.empty{text-align:center;padding:60px 0}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:17px;font-weight:600;color:#fff;margin-bottom:6px}
.empty-sub{font-size:13px;color:rgba(255,255,255,0.35);line-height:1.6}
.q-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;margin-bottom:14px;overflow:hidden;transition:.2s}
.q-card:hover{border-color:rgba(255,255,255,0.15)}
.q-card-top{padding:18px 20px;cursor:pointer}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.q-field{font-size:10px;font-weight:600;letter-spacing:1.5px;color:#4B80F0;background:rgba(26,86,219,0.15);padding:4px 10px;border-radius:6px}
.q-stage{font-size:10px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.06);padding:4px 10px;border-radius:6px}
.q-date{font-size:11px;color:rgba(255,255,255,0.2);margin-left:auto}
.q-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.q-status-dot.forwarded{background:#F59E0B}
.q-status-dot.answered{background:#0EA371}
.q-question{font-size:15px;font-weight:500;color:#fff;line-height:1.5;margin-bottom:8px}
.q-seeker{font-size:12px;color:rgba(255,255,255,0.3)}
.q-expand{font-size:12px;color:#4B80F0;margin-top:8px}
.q-card-body{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease}
.q-card-body.open{max-height:1000px;padding:0 20px 20px}
.ai-answer-box{background:rgba(26,86,219,0.08);border:1px solid rgba(26,86,219,0.15);border-radius:10px;padding:14px;margin-bottom:16px}
.ai-answer-label{font-size:10px;font-weight:600;letter-spacing:1.5px;color:rgba(26,86,219,0.7);margin-bottom:8px}
.ai-answer-text{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.7}
.answer-section{margin-top:4px}
.answer-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:10px}
.answer-input{width:100%;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:120px;transition:.2s}
.answer-input:focus{border-color:#1A56DB}
.answer-input::placeholder{color:rgba(255,255,255,0.2)}
.answer-input:disabled{opacity:0.5;cursor:not-allowed}
.submit-btn{width:100%;padding:13px;background:#1A56DB;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:10px;transition:.2s}
.submit-btn:active{background:#1341B0;transform:scale(0.98)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}
.already-answered{padding:12px 14px;background:rgba(14,163,113,0.1);border:1px solid rgba(14,163,113,0.2);border-radius:10px;font-size:13px;color:#0EA371}
.rejection-box{padding:12px 14px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);border-radius:10px;font-size:13px;color:#F59E0B;margin-top:10px;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:999;display:none;white-space:nowrap}
.toast.success{background:#0EA371;color:#fff}
.toast.error{background:#EF4444;color:#fff}
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-mark">Z</div>
    <div class="logo-name">Zenith Counsellor Portal</div>
  </div>
  <div class="nav-right">
    <span class="nav-email" id="navEmail"></span>
    <button class="nav-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">Questions</div>
    <div class="page-sub" id="pageSubTitle">Loading...</div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterBy('all', this)">All fields</button>
    <button class="filter-btn" onclick="filterBy('Medicine & Healthcare', this)">Medicine</button>
    <button class="filter-btn" onclick="filterBy('Engineering & Tech', this)">Engineering & Tech</button>
    <button class="filter-btn" onclick="filterBy('Business, Finance & MBA', this)">Business & MBA</button>
    <button class="filter-btn" onclick="filterBy('Law & Civil Services', this)">Law & Civil</button>
    <button class="filter-btn" onclick="filterBy('Creative & Media', this)">Creative & Media</button>
    <button class="filter-btn" onclick="filterBy('Other', this)">Other</button>
  </div>

  <div id="content"><div class="loading">Loading questions...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://zenith-backend-mu.vercel.app/api';
const token = localStorage.getItem('zenith_counsellor_token');
const counsellorId = localStorage.getItem('zenith_counsellor_id');
const email = localStorage.getItem('zenith_counsellor_email');

if (!token) window.location.href = 'index.html';
if (email) document.getElementById('navEmail').textContent = email;

let allQuestions = [];
let currentFilter = 'all';

function signOut() {
  localStorage.removeItem('zenith_counsellor_token');
  localStorage.removeItem('zenith_counsellor_email');
  localStorage.removeItem('zenith_counsellor_id');
  window.location.href = 'index.html';
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
}

function cleanText(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function filterBy(field, btn) {
  currentFilter = field;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

function toggleExpand(id) {
  const body = document.getElementById('body-' + id);
  const arrow = document.getElementById('arrow-' + id);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  arrow.textContent = isOpen ? '▼ View question & answer' : '▲ Collapse';
}

async function submitAnswer(questionId) {
  const textarea = document.getElementById('ans-' + questionId);
  const btn = document.getElementById('btn-' + questionId);
  const rejBox = document.getElementById('rej-' + questionId);
  const answerText = textarea.value.trim();

  if (!answerText) { showToast('Please write an answer first.', 'error'); return; }

  btn.textContent = 'Checking quality...';
  btn.disabled = true;
  textarea.disabled = true;
  rejBox.style.display = 'none';

  try {
    const res = await fetch(`${BACKEND}/submit-answer`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question_id: questionId,
        counsellor_id: counsellorId,
        answer_text: answerText,
        counsellor_name: email
      })
    });
    const data = await res.json();

    if (data.success && data.approved) {
      showToast('Answer submitted and approved.');
      await loadQuestions();
    } else {
      rejBox.textContent = 'Quality check: ' + (data.reason || 'Answer needs improvement. Please be more specific and actionable.');
      rejBox.style.display = 'block';
      btn.textContent = 'Submit Answer';
      btn.disabled = false;
      textarea.disabled = false;
    }
  } catch (e) {
    showToast('Connection error. Please try again.', 'error');
    btn.textContent = 'Submit Answer';
    btn.disabled = false;
    textarea.disabled = false;
  }
}

function renderQuestions() {
  const content = document.getElementById('content');
  const filtered = currentFilter === 'all'
    ? allQuestions
    : allQuestions.filter(q => q.field_tag === currentFilter);

  const sub = document.getElementById('pageSubTitle');
  sub.textContent = filtered.length + ' question' + (filtered.length !== 1 ? 's' : '') + ' waiting for your expertise';

  if (filtered.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-title">All caught up</div>
        <div class="empty-sub">No questions in this category right now. Check back later.</div>
      </div>`;
    return;
  }

  let html = '';
  filtered.forEach(q => {
    const isAnswered = q.status === 'counsellor_answered';
    const seekerName = q.seekers?.name || 'Anonymous';
    const seekerStage = q.seekers?.career_stage || '';

    html += `
      <div class="q-card">
        <div class="q-card-top" onclick="toggleExpand('${q.id}')">
          <div class="q-meta">
            <div class="q-status-dot ${isAnswered ? 'answered' : 'forwarded'}"></div>
            <span class="q-field">${q.field_tag || 'General'}</span>
            <span class="q-stage">${seekerStage}</span>
            <span class="q-date">${formatDate(q.forwarded_at || q.created_at)}</span>
          </div>
          <div class="q-question">${q.reframed_question || 'Career guidance question'}</div>
          <div class="q-seeker">From ${seekerName}</div>
          <div class="q-expand" id="arrow-${q.id}">▼ View question & answer</div>
        </div>
        <div class="q-card-body" id="body-${q.id}">`;

    if (q.ai_answer) {
      html += `
          <div class="ai-answer-box">
            <div class="ai-answer-label">ZENITH AI ANSWER (for context)</div>
            <div class="ai-answer-text">${cleanText(q.ai_answer)}</div>
          </div>`;
    }

    if (isAnswered) {
      html += `<div class="already-answered">✓ You have already answered this question. The seeker has been notified.</div>`;
    } else {
      html += `
          <div class="answer-section">
            <div class="answer-label">YOUR ANSWER</div>
            <textarea class="answer-input" id="ans-${q.id}" placeholder="Write a specific, actionable answer for this person. Be direct and honest. Minimum 3 sentences."></textarea>
            <div class="rejection-box" id="rej-${q.id}"></div>
            <button class="submit-btn" id="btn-${q.id}" onclick="submitAnswer('${q.id}')">Submit Answer</button>
          </div>`;
    }

    html += `</div></div>`;
  });

  content.innerHTML = html;
}

async function loadQuestions() {
  try {
    const res = await fetch(`${BACKEND}/get-questions?status=all`);
    const data = await res.json();
    if (data.success) {
      allQuestions = data.questions || [];
      renderQuestions();
    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    document.getElementById('content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">Could not load questions</div>
        <div class="empty-sub">Connection issue. Please refresh the page.</div>
      </div>`;
  }
}

loadQuestions();
</script>
</body>
</html>
